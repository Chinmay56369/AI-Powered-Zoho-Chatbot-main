services:
  backend:
    build:
      context: .
      target: backend
    env_file:
      - .env
    environment:
      BACKEND_BASE_URL: http://localhost:8000
      FRONTEND_ORIGIN: http://localhost:5173
      ZOHO_REDIRECT_URI: http://localhost:8000/auth/callback
      DATABASE_PATH: /app/data/zoho_assistant.db
    ports:
      - "8000:8000"
    volumes:
      - zoho-assistant-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  zoho-assistant-data: